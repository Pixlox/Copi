name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: choco install wixtoolset --no-progress -y

      - name: Configure WiX path
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wixDir = $null
          foreach ($root in @('C:\Program Files (x86)', 'C:\Program Files')) {
            if (-not (Test-Path $root)) {
              continue
            }

            $candidate = Get-ChildItem $root -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
              Where-Object { Test-Path (Join-Path $_.FullName 'bin\candle.exe') } |
              Sort-Object FullName -Descending |
              Select-Object -First 1

            if ($candidate) {
              $wixDir = $candidate.FullName
              break
            }
          }

          if (-not $wixDir) {
            throw 'WiX toolset not found after installation.'
          }

          $wixBin = Join-Path $wixDir 'bin'
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "WIX=$wixDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          where.exe candle.exe
          where.exe light.exe

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release metadata
        run: npm run release:check
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Prepare updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          key_file="$RUNNER_TEMP/tauri-updater.key"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_CONTENT" > "$key_file"
          chmod 600 "$key_file"
          echo "TAURI_SIGNING_PRIVATE_KEY=$key_file" >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          TAURI_LOG: debug
          RUST_LOG: tauri_bundler=debug
          RUST_BACKTRACE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "Copi ${{ github.ref_name }}"
          releaseBody: |
            Automated build for Copi. Install bundles are attached below.

            **NOTE:**
            macOS users must remove the quarantine flag from Copi before using it, or macOS will say that it is damaged.

            To do this, simply run this in your terminal:

            `xattr -rd com.apple.quarantine /path/to/copi.app`

            Then, right-click -> open it.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}
